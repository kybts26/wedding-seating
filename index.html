<!DOCTYPE html>
<html>
<head>
  <title>Find Your Wedding Table</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>💍 Thảo & Xuyên</h1>
<h2>Wedding Day</h2>
<p>July 25, 2026</p>

<p>Find your table below</p>

<input id="nameInput" type="text" placeholder="Your name">

<button onclick="findTable()">Search</button>

<div id="result"></div>

</div>

<script src="guests.js"></script>

<script>

function findTable() {

const searchName = document
.getElementById("nameInput")
.value
.toLowerCase()
.trim();

const matches = guests.filter(person =>
person.name.toLowerCase().includes(searchName)
);

const result = document.getElementById("result");

if (matches.length === 1) {

result.innerHTML =
"🎉 Welcome, " + matches[0].name +
"!<br><br>🪑 Your table is <b>" +
matches[0].table +
"</b>";

}

else if (matches.length > 1) {

result.innerHTML = "Please choose your name:<br><br>" +
matches.map(person =>
"👤 " + person.name + " — " + person.table
).join("<br>");

}

else {

result.innerHTML =
"Sorry, we couldn't find your name.";

}

}

</script>

</body>
</html>
